fixmov:
    t2: "fix"
    t1: "mov"
hps_params_path: "config/registration/defaults/convex_adam_sweep_hcpt2t1_ch28_nc400.json"
dataset_hps: 
    name: "hcpt2t1"
    subset: "train1"
    perm2: True
    mask: False
dataset_test:
    type: "test"
    name: "hcpt2t1"
    subset: "test1"
    perm2: True
    mask: False

registration:
    ca:
        affine: "none"
        l2_normalize: True
    gica:
        affine: "scale"
        l2_normalize: True


output_dir: "./results/registration/hcpt2t1/am0p1_<fit_type>/am0p1_<model>_<fit_type>"

model:
    type: "vit3d"
    path: "./weights/hcpt2t1/<fit_type>/<model>_<fit_type>"
    # if wrapper is not specified, it defaults to identity (i.e. no wrapper, direct use of features)
    wrapper: # am0p1: add mind with multiplier 0.1, select first 16 channels, no norm
        name: basicadd2mind
        select: "[:16]"
        norm: none
        mult: 0.1

features:
    axi: "axi" # Axial PCA
    proj: "proj" # Projection (WPLS, PCA3D, etc.)